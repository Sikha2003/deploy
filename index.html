<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Spring Workspace | v2.0</title>
    
    <style>
        :root {
            --spring-green: #6db33f;
            --spring-dark: #34302d;
            --bg: #0d1117;
            --card-bg: #161b22;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Top Progress Indicator */
        .progress-line {
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, #6db33f, #34302d, #6db33f);
            background-size: 200% 100%;
            animation: move 4s linear infinite;
        }

        @keyframes move {
            0% { background-position: 200% 0; }
            100% { background-position: 0% 0; }
        }

        header {
            background-color: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--spring-green);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .hero-split {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        h1 span { color: var(--spring-green); }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        /* Code Block Simulation */
        .code-window {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .code-window span { color: var(--spring-green); }

        .btn-spring {
            background-color: var(--spring-green);
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: filter 0.2s;
        }

        .btn-spring:hover { filter: brightness(1.1); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--spring-green);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero-split { grid-template-columns: 1fr; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="progress-line"></div>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--spring-green)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Spring<span>OS</span>
        </div>
        <nav style="color: var(--text-dim); font-size: 0.9rem;">v2.0.0-RELEASE</nav>
    </header>

    <main class="container">
        <section class="hero-split">
            <div>
                <h1>Build <span>Anything</span> with Spring.</h1>
