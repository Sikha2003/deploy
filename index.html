<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>GitHub Actions Deployment</title>
    
    <!-- Internal CSS starts here -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117; /* GitHub Dark Theme Background */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            color: #58a6ff;
            margin-top: 0;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #238636;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .badge {
            background-color: #21262d;
            border: 1px solid #30363d;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Live Site</h1>
        <p>This page is hosted via GitHub Pages.</p>
        <div class="badge">
            <span class="status-dot"></span>
            <span>CI/CD Active</span>
        </div>
    </div>

</body>
</html>
