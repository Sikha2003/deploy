name: index.app
on:
 push:
  branches:
   - main

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name : upload site
      uses: actions/upload-site-artifact@v3
      with:
       path: .

    - name: deploy to site
      uses: actions/deploy-site@v4
     
